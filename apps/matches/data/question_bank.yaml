templates:
  # --- Basic (always on every match) ---
  - code: MATCH_WINNER
    bucket: basic
    category: winner
    question_type: choice
    points: 10
    question_text: "Who will win the match?"
    options: *winner

  - code: HOME_GOALS
    bucket: basic
    category: goals
    question_type: choice
    points: 5
    question_text: "Goals scored by {home_team}?"
    options: *goal_count

  - code: AWAY_GOALS
    bucket: basic
    category: goals
    question_type: choice
    points: 5
    question_text: "Goals scored by {away_team}?"
    options: *goal_count

  # --- Player / Scoring (pick 1 per match, 4 pts) ---
  - code: PLAYER_OF_MATCH
    bucket: player
    category: player
    question_type: player_pick
    points: 4
    question_text: "Who will be Player of the match?"
    options:
      dynamic: squad_players

  - code: FIRST_GOAL_SCORER
    bucket: player
    category: player
    question_type: player_pick
    points: 4
    question_text: "Who will score the first goal in the match?"
    options:
      dynamic: squad_players_with_no_goal

  - code: FIRST_GOAL_TYPE
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "First goal in the match will be?"
    options: *first_goal_type

  - code: FIRST_GOAL_MINUTE
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "When will the first goal be scored (minute)?"
    options: *first_goal_minute

  - code: FIRST_GOAL_TEAM
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Which team will score first?"
    options: *first_goal_team

  - code: LAST_MINUTE_GOAL
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Will there be a last-minute (after 85') goal?"
    options: *yes_no_no_results

  - code: FIRST_ASSIST_PROVIDER
    bucket: player
    category: player
    question_type: player_pick
    points: 4
    question_text: "Who will provide the first assist of the match?"
    options:
      dynamic: squad_players_with_no_goal

  - code: BRACE_SCORED
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Will any player score a brace?"
    options: *yes_no_no_results

  - code: HAT_TRICK
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Will there be a hat-trick in the match?"
    options: *yes_no_no_results

  - code: FIRST_GOAL_POSITION
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Which position will score the first goal of the match?"
    options: *goal_position

  - code: FIRST_ASSIST_POSITION
    bucket: player
    category: player
    question_type: choice
    points: 4
    question_text: "Which position will assist the first goal of the match?"
    options: *assist_position

  # --- Attacking (2 pts, random pool) ---
  - code: HOME_POSSESSION
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total possession by {home_team}?"
    options: *possession

  - code: AWAY_POSSESSION
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total possession by {away_team}?"
    options: *possession

  - code: TOTAL_GOALS
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total goals in the match?"
    options: *goal_count

  - code: GOALS_INSIDE_BOX
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total goals inside penalty area?"
    options: *goal_count

  - code: GOALS_OUTSIDE_BOX
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total goals outside penalty area?"
    options: *goal_count

  - code: TOTAL_ASSISTS
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total assists in the match?"
    options: *goal_count

  - code: GOALS_FIRST_HALF
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total goals scored in the first half?"
    options: *goal_count

  - code: ASSISTS_FIRST_HALF
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total assists in the first half?"
    options: *goal_count

  - code: GOALS_SECOND_HALF
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total goals scored in the second half?"
    options: *goal_count

  - code: ASSISTS_SECOND_HALF
    bucket: attacking
    category: stats
    question_type: choice
    points: 2
    question_text: "Total assists in the second half?"
    options: *goal_count

  # --- Attempts (2 pts) ---
  - code: TOTAL_ATTEMPTS
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal?"
    options: *attempts_total

  - code: HOME_ATTEMPTS
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal by {home_team}?"
    options: *attempts_team

  - code: AWAY_ATTEMPTS
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal by {away_team}?"
    options: *attempts_team

  - code: TOTAL_ATTEMPTS_ON_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal on target?"
    options: *attempts_on_target_total

  - code: HOME_ATTEMPTS_ON_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal on target by {home_team}?"
    options: *attempts_on_target_team

  - code: AWAY_ATTEMPTS_ON_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal on target by {away_team}?"
    options: *attempts_on_target_team

  - code: TOTAL_ATTEMPTS_OFF_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal off target?"
    options: *attempts_on_target_total

  - code: HOME_ATTEMPTS_OFF_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal off target by {home_team}?"
    options: *attempts_on_target_team

  - code: AWAY_ATTEMPTS_OFF_TARGET
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total attempts at goal off target by {away_team}?"
    options: *attempts_on_target_team

  - code: TOTAL_ATTEMEPTS_INSIDE_PENALTY
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total Attempts at Goal Inside the Penalty Area?"
    options: *attempts_team

  - code: TOTAL_ATTEMPTS_OUTSIDE_PENALTY
    bucket: attempts
    category: stats
    question_type: choice
    points: 2
    question_text: "Total Attempts at Goal Outside the Penalty Area?"
    options: *attempts_team

  # --- Discipline (2 pts) ---
  - code: TOTAL_YELLOW_CARDS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total yellow cards in the match?"
    options: *goal_count

  - code: TOTAL_RED_CARDS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total red cards in the match?"
    options: *goal_count

  - code: TOTAL_CARDS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total cards in the match?"
    options: *goal_count

  - code: TOTAL_FOULS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total fouls against in the match?"
    options: *fouls_total

  - code: TOTAL_OFFSIDES
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total offsides in the match?"
    options: *goal_count

  - code: HOME_FOULS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total fouls against by {home_team} in the match?"
    options: *fouls_team

  - code: AWAY_FOULS
    bucket: discipline
    category: stats
    question_type: choice
    points: 2
    question_text: "Total fouls against by {away_team} in the match?"
    options: *fouls_team

  # --- Distribution (2 pts) ---
  - code: TOTAL_PASSES
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes in the match?"
    options: *passes_total

  - code: HOME_PASSES
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes by {home_team}?"
    options: *passes_team

  - code: AWAY_PASSES
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes by {away_team}?"
    options: *passes_team

  - code: TOTAL_PASSES_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes completed in the match?"
    options: *passes_completed_total

  - code: HOME_PASSES_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes completed by {home_team}?"
    options: *passes_completed_team

  - code: AWAY_PASSES_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total passes completed by {away_team}?"
    options: *passes_completed_team

  - code: TOTAL_CROSSES
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total crosses in the match?"
    options: *crosses_total

  - code: HOME_CROSSES
    bucket: distribution
    category: stats
    question_type: choice
