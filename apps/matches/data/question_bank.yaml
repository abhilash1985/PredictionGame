    options: *crosses_completed_total

  - code: HOME_CROSSES_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total crosses completed by {home_team}?"
    options: *crosses_completed_team

  - code: AWAY_CROSSES_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total crosses completed by {away_team}?"
    options: *crosses_completed_team

  - code: SWITCHES_OF_PLAY_COMPLETED
    bucket: distribution
    category: stats
    question_type: choice
    points: 2
    question_text: "Total switches of play completed in the match?"
    options: *switches_completed

  # --- Set plays (2 pts) ---
  - code: TOTAL_CORNERS
    bucket: set_plays
    category: stats
    question_type: choice
    points: 2
    question_text: "Total corners in the match?"
    options: *corners_total

  - code: HOME_CORNERS
    bucket: set_plays
    category: stats
    question_type: choice
    points: 2
    question_text: "Total corners by {home_team}?"
