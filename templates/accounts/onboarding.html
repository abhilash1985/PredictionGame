{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card card-football">
      <div class="card-header">Welcome — Set Up Your Profile</div>
      <div class="card-body">
        <p class="text-muted">Before you start predicting, set your display name, favorite team, timezone, and AI Predict preference.</p>
        <form method="post">
          {% csrf_token %}
          {% include 'accounts/partials/profile_form_fields.html' with form=form %}
          <button type="submit" class="btn btn-gold w-100">Continue to Dashboard</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
