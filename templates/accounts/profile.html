{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card card-football">
      <div class="card-header">Your Profile</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% include 'accounts/partials/profile_form_fields.html' with form=form %}
          <button type="submit" class="btn btn-gold">Save Profile</button>
          <a href="{% url 'password_change' %}" class="btn btn-outline-secondary ms-2">Change Password</a>
        </form>
        <hr>
        <p class="small text-muted mb-0">Boosters used: {{ user.profile.boosters_used }} · Remaining: {{ user.profile.point_boosters_remaining }}</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
