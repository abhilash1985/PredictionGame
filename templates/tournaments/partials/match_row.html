<div class="list-group-item match-row py-3">
  <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
    <div>
      <div class="fw-semibold">
        {{ match.team_home.short_name }} vs {{ match.team_away.short_name }}
      </div>
      <small class="text-muted">
        Match {{ match.match_number }} · {{ match.stadium.name }}, {{ match.stadium.city }}
      </small>
      <br>
      <small>{{ match.kickoff_at|date:"M j, Y H:i" }} UTC</small>
    </div>
    <div class="text-end">
      <span class="countdown" data-kickoff="{{ match.kickoff_at|date:'c' }}">...</span>
      {% if user.is_authenticated %}
        <div class="mt-2">
          <a href="{% url 'match_detail' match.pk %}" class="btn btn-sm btn-outline-success">Details</a>
          <a href="{% url 'match_squad' match.pk %}" class="btn btn-sm btn-outline-secondary">Squads</a>
        </div>
      {% endif %}
    </div>
  </div>
</div>
