<ol class="leaderboard-top-list list-unstyled mb-0">
  {% for row in leaderboard_top %}
    <li class="leaderboard-top-item{% if row.rank <= 3 %} leaderboard-top-item-{{ row.rank }}{% endif %}">
      <span class="leaderboard-top-rank">
        {% if row.rank == 1 %}
          <i class="bi bi-trophy-fill text-warning"></i>
        {% else %}
          {{ row.rank|default:forloop.counter }}
        {% endif %}
      </span>
      <span class="leaderboard-top-name">{{ row.display_name }}</span>
      <span class="leaderboard-top-points">{{ row.total_points }}</span>
    </li>
  {% empty %}
    <li class="leaderboard-top-empty text-muted small py-3 px-3">No predictions yet. Be the first to score!</li>
  {% endfor %}
</ol>
