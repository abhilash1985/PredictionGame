<div class="table-responsive">
  <table class="table table-sm table-striped mb-0 leaderboard-top-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th class="text-center">Matches</th>
        <th class="text-center">%</th>
        <th class="text-end">Points</th>
      </tr>
    </thead>
    <tbody>
      {% for row in leaderboard_top %}
        <tr>
          <td class="text-muted">{{ forloop.counter }}</td>
          <td class="fw-semibold">{{ row.display_name }}</td>
          <td class="text-center">{{ row.matches_predicted }}</td>
          <td class="text-center">{{ row.prediction_percentage }}%</td>
          <td class="text-end text-warning fw-bold">{{ row.total_points }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="5" class="text-muted small py-3">No predictions yet. Be the first to score!</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
