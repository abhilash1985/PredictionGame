{% extends 'base.html' %}

{% block content %}
<div class="card card-football">
  <div class="card-header">Score Match — {{ match }}</div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% for question in match.questions.all %}
        <div class="mb-3">
          <label class="form-label">{{ question.question_text }} ({{ question.points }} pts)</label>
          <input type="text" name="answer_{{ question.id }}" class="form-control"
                 value="{{ question.correct_answer|default:'' }}"
                 list="options_{{ question.id }}">
          {% if question.options %}
            <datalist id="options_{{ question.id }}">
              {% for opt in question.options %}<option value="{{ opt }}">{% endfor %}
            </datalist>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-gold">Save Answers & Score</button>
    </form>
  </div>
</div>
{% endblock %}
