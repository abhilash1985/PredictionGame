{% for field in form %}
  <div class="password-field-group mb-3">
    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    <div class="password-input-wrap">
      {% if field.name == 'old_password' %}
        <i class="bi bi-unlock password-input-icon" aria-hidden="true"></i>
      {% elif field.name == 'new_password1' %}
        <i class="bi bi-key password-input-icon" aria-hidden="true"></i>
      {% else %}
        <i class="bi bi-shield-check password-input-icon" aria-hidden="true"></i>
      {% endif %}
      {{ field }}
    </div>
    {% if field.help_text %}
      <div class="form-text">{{ field.help_text|safe }}</div>
    {% endif %}
    {% if field.errors %}
      <div class="text-danger small mt-1">{{ field.errors }}</div>
    {% endif %}
  </div>
{% endfor %}
