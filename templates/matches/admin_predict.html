{% extends 'base.html' %}

{% block content %}
<div class="card card-football">
  <div class="card-header">Admin Predict for {{ target_user.display_name }}</div>
  <div class="card-body">
    <p>{{ match }}</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="mb-3">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="btn btn-gold">Save</button>
    </form>
  </div>
</div>
{% endblock %}
