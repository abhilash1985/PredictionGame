{% load socialaccount %}
{% if google_oauth_enabled %}
<div class="auth-oauth">
  <a href="{% provider_login_url 'google' %}" class="btn btn-google w-100">
    <span class="btn-google-icon" aria-hidden="true">
      <i class="bi bi-google"></i>
    </span>
    Continue with Google
  </a>
</div>
<div class="auth-divider" role="separator" aria-label="Or sign up with email">
  <span>OR</span>
</div>
{% endif %}
