<div class="admin-question-row card admin-question-editor-card mb-3" data-row-index="{{ row.index }}">
  <div class="card-body">
    <div class="admin-question-row-head">
      <span class="admin-question-row-badge">
        <i class="bi bi-chat-square-text me-1"></i> Question {{ row.index|add:1 }}
      </span>
      {% if row.id %}
        <div class="form-check admin-question-remove">
          <input class="form-check-input" type="checkbox" name="delete_{{ row.index }}" id="delete_{{ row.index }}" value="1" {% if row.delete %}checked{% endif %}>
          <label class="form-check-label" for="delete_{{ row.index }}">
            <i class="bi bi-trash me-1"></i> Remove
          </label>
        </div>
      {% endif %}
    </div>
    {% if row.id %}
      <input type="hidden" name="question_id_{{ row.index }}" value="{{ row.id }}">
    {% endif %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label" for="template_id_{{ row.index }}">Question template</label>
        <select name="template_id_{{ row.index }}" id="template_id_{{ row.index }}" class="form-select template-select" required>
          <option value="">— Select question —</option>
          {% for template in question_templates %}
            <option value="{{ template.pk }}" {% if row.template_id|stringformat:'s' == template.pk|stringformat:'s' %}selected{% endif %}>
              {{ template.code }} ({{ template.get_category_display }})
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label" for="points_{{ row.index }}">Points</label>
        <input type="number" name="points_{{ row.index }}" id="points_{{ row.index }}" class="form-control question-points" min="1" value="{{ row.points }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label" for="question_text_{{ row.index }}">Question text</label>
        <input type="text" name="question_text_{{ row.index }}" id="question_text_{{ row.index }}" class="form-control question-text" value="{{ row.question_text }}" required>
      </div>
      <div class="col-12">
        <label class="form-label" for="options_{{ row.index }}">Options (one per line)</label>
        <textarea name="options_{{ row.index }}" id="options_{{ row.index }}" class="form-control question-options" rows="4" placeholder="Option 1&#10;Option 2">{{ row.options }}</textarea>
        <div class="form-text">Each line becomes a selectable answer on the Predict page.</div>
      </div>
    </div>
  </div>
</div>
