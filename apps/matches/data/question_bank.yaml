# FIFA 2026 Prediction Game — master question bank
# Placeholders: {home_team}, {away_team}
# Dynamic option keys are resolved per match in question_bank.py

match_pattern:
  total_questions: 7
  required:
    - basic
  picks:
    - bucket: player
      count: 1
      points_each: 4
    - bucket: random_stats
      count: 3
      points_each: 2
      one_per_sub_bucket: true
      sub_buckets:
        - attacking
        - attempts
        - discipline
        - distribution
        - set_plays
        - defending
        - duels
        - goalkeeping

