# FIFA 2026 Prediction Game — master question bank
# Placeholders: {home_team}, {away_team}
# Dynamic option keys are resolved per match in question_bank.py

match_pattern:
  total_questions: 7
  required:
    - basic
  picks:
    - bucket: player
      count: 1
      points_each: 4
    - bucket: random_stats
      count: 3
      points_each: 2
      one_per_sub_bucket: true
      sub_buckets:
        - attacking
        - attempts
        - discipline
        - distribution
        - set_plays
        - defending

option_presets:
  goal_count: &goal_count
    - "0"
    - "1"
    - "2"
    - "3"
    - "4"
    - "5"
    - "5+"
  winner: &winner
    dynamic: home_away_draw_no_results
  first_goal_team: &first_goal_team
    dynamic: home_away_draw_no_results
  yes_no_no_results: &yes_no_no_results
    - "Yes"
    - "No"
    - "No Results"
  yes_no: &yes_no
    - "Yes"
    - "No"
  first_goal_type: &first_goal_type
    - "Penalty"
    - "Free Kick"
    - "Corner"
    - "Inside the Box (Open Play)"
    - "Outside the Box (Long Range)"
    - "Own Goal"
    - "No Goals"
    - "Others"
  first_goal_minute: &first_goal_minute
    - "0-15"
    - "16-30"
    - "31-45"
    - "46-60"
    - "61-75"
    - "76-90"
    - "90+"
    - "No Goals"
  goal_position: &goal_position
    - "No goals"
    - "ST (Striker)"
    - "LW (Left Wing)"
    - "CAM (Attacking Midfielder)"
    - "RB (Right Back)"
    - "CM (Central Midfielder)"
    - "RW (Right Wing)"
    - "Others"
  assist_position: &assist_position
    - "No goals"
    - "LW"
    - "RW"
    - "CM"
    - "LM"
    - "CB"
    - "GK"
    - "Others"
  possession: &possession
    - "0-25%"
    - "26-35%"
    - "36-45%"
    - "46-60%"
    - "61-75%"
    - "75%+"
  attempts_total: &attempts_total
    - "0-3"
    - "4-7"
    - "8-10"
    - "11-13"
    - "14-17"
    - "17-20"
    - "20+"
  attempts_team: &attempts_team
    - "0-3"
    - "4-6"
    - "7-9"
    - "10-12"
    - "13-15"
    - "15+"
  attempts_on_target_total: &attempts_on_target_total
    - "0-3"
    - "4-6"
    - "7-9"
    - "10-12"
    - "13-15"
    - "15+"
  attempts_on_target_team: &attempts_on_target_team
    - "0"
    - "1-3"
    - "4-6"
    - "7-8"
    - "9-10"
    - "10+"
  fouls_total: &fouls_total
    - "0-5"
    - "6-10"
    - "11-15"
    - "16-20"
    - "21-25"
    - "26-30"
    - "30+"
  fouls_team: &fouls_team
    - "0-5"
    - "6-8"
    - "9-12"
    - "13-15"
    - "16-18"
    - "19-20"
    - "20+"
  passes_total: &passes_total
    - "0-300"
    - "301-400"
    - "401-500"
    - "501-650"
    - "651-750"
    - "751-850"
    - "850+"
  passes_team: &passes_team
    - "0-200"
    - "201-300"
    - "301-400"
    - "401-500"
    - "501-600"
    - "600+"
  passes_completed_total: &passes_completed_total
    - "0-300"
    - "301-400"
    - "401-500"
    - "501-650"
    - "651-750"
    - "750+"
  passes_completed_team: &passes_completed_team
    - "0-100"
    - "101-200"
    - "201-300"
    - "301-400"
    - "401-500"
    - "500+"
  crosses_total: &crosses_total
    - "0-10"
    - "11-20"
    - "21-25"
    - "26-30"
    - "31-35"
    - "36-40"
    - "40+"
  crosses_team: &crosses_team
    - "0-5"
    - "6-10"
    - "11-13"
    - "14-17"
    - "18-20"
    - "20+"
  crosses_completed_total: &crosses_completed_total
    - "0-2"
    - "3-4"
    - "5-6"
    - "7-8"
    - "9-10"
    - "10+"
  crosses_completed_team: &crosses_completed_team
